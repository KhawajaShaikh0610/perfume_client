[build]
  command = "npm run build"
  publish = "dist"

# Handle SPA routing - THIS MUST BE FIRST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Fix MIME types - Apply to ALL JavaScript files anywhere
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/*.mjs"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/*.cjs"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Content-Type = "text/css"

# Also handle files in subdirectories
[[headers]]
  for = "/**/*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/**/*.css"
  [headers.values]
    Content-Type = "text/css"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"