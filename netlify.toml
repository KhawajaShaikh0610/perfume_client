[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Content-Type = "text/css"

# Handle SPA routing (important for React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200